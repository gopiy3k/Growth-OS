# Growth OS — gitleaks configuration
#
# The repository has been verified secret-free:
#   - no real .env is committed (only .env.example with placeholders)
#   - every SUPABASE_*/BUFFER_*/AI_RUNTIME_* reference in code is an os.environ
#     read, never a hardcoded value
#   - X auth cookie references (twid / auth_token / ct0) are cookie NAMES in
#     docs/code/tests, never secret VALUES
#
# This config keeps gitleaks' built-in default rules so REAL leaks are still caught,
# but allowlists the known false-positive contexts that newer gitleaks generic rules
# flag: env-var NAMES and X cookie NAMES (identifiers), plus the literal placeholder
# values used in .env.example.
#
# SAFETY: gitleaks captures the SECRET VALUE (the text after `=`/`:`), not the
# variable name. A real `SUPABASE_SERVICE_ROLE_KEY=<actual-secret>` would capture
# `<actual-secret>`, which does NOT match these placeholder/cookie-name patterns,
# so genuine leaks remain flagged. Only value-less identifiers and the documented
# placeholder strings are suppressed.

title = "Growth OS"

[extend]
useDefault = true

[allowlist]
description = "Allowlist env-var NAMES, X auth cookie NAMES (identifiers only, not values), and the documented placeholder values in .env.example. Real secret values are still detected."
regexes = [
  # env-var / cookie NAMES as bare identifiers (no secret value captured)
  "(?i)(?:SUPABASE_(?:URL|SERVICE_ROLE_KEY|ANON_KEY)|AI_RUNTIME_(?:BASE_URL|API_KEY|MODEL)|BUFFER_(?:ACCESS_TOKEN|LINKEDIN_PROFILE_ID|X_PROFILE_ID)|auth_token|ct0|twid)",
  # documented placeholder VALUES used in .env.example (impossible as real secrets)
  "(?i)(replace-with-your-[a-z0-9-]+|your-[a-z0-9-]+|demo|YOUR-PROJECT)"
]
