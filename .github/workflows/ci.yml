name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: AI Runtime contract tests (no Supabase / no Hermes / no paid services)
        run: python -m pytest tests/contract -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check engines tests || true   # advisory until clean

  sql-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject product table references in platform migrations
        run: |
          if grep -rniE 'references[^(]*\b(profiles|brands|organizations|users|customers|subscriptions)\b' migrations/; then
            echo "ERROR: platform migration references a product table"; exit 1
          fi

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Deterministic OSS Gitleaks install (no wrapper action, no license required).
      # Replaces the floating gitleaks/gitleaks-action@v2 tag, which now resolves to a
      # commercial-license-gated build that fails before scanning (infra regression, not a
      # repo secret). Pinned version keeps the scan reproducible and license-free.
      - name: Install Gitleaks (OSS binary)
        run: |
          GITLEAKS_VERSION="8.24.3"
          ARCH="linux_x64"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${ARCH}.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run Gitleaks secret scan
        run: |
          gitleaks detect \
            --source . \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --no-banner
      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
